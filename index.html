<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Пульт управления Сушиселл</title>
    <link rel="stylesheet" href="./src/styles.css?v=0.1.5" />
  </head>
  <body class="is-loading">

    <section class="loading-screen" id="loading-screen" aria-labelledby="loading-title" aria-live="polite">
      <div class="loading-card">
        <span class="loading-mark" aria-hidden="true"></span>
        <p class="loading-eyebrow">Пульт управления Сушиселл</p>
        <h1 id="loading-title">Подключаемся к таблице</h1>
        <p>Загружаем сотрудников, роли и метрики. Это займёт пару секунд.</p>
      </div>
    </section>

    <header class="app-header" aria-label="Шапка пульта">
      <a class="brand" href="#pult-main" aria-label="Пульт управления Сушиселл">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Пульт управления Сушиселл</span>
      </a>
      <span class="app-version" id="app-version" aria-label="Версия приложения">v0.1.5</span>
    </header>

    <main class="app-shell" id="pult-main">
      <section class="panel ident-panel" aria-labelledby="ident-title">
        <h1 id="ident-title">Идентификация</h1>
        <div class="toolbar" aria-label="Настройки отчёта">
          <label>
            Выбрать дату
            <input id="date-input" type="date" />
            <span class="field-error" id="date-error" role="alert" hidden></span>
          </label>
          <label>
            Выбрать ФИО
            <select id="owner-input"></select>
          </label>
        </div>
      </section>

      <section class="panel checks-panel" aria-labelledby="active-category-title">
        <div class="panel-header">
          <h2 id="active-category-title">Ежедневные проверки</h2>
          <span class="visually-hidden" id="active-category-count">0 из 0 проверено</span>
        </div>
        <div class="frequency-filters" id="category-tabs" aria-label="Фильтр периодичности"></div>
        <div class="checklist-list" id="checklist-body"></div>
        <div class="save-actions" aria-label="Сохранение отчётов">
          <button class="save-button" id="save-daily-button" type="button">Сохранить ежедневный отчёт</button>
          <button class="save-button save-button-secondary" id="save-weekly-button" type="button">Сохранить еженедельный отчёт</button>
        </div>
        <p class="save-feedback" id="save-feedback" role="status" aria-live="polite"></p>
      </section>

      <section class="panel manager-panel" id="manager-dashboard" aria-label="Дашборд руководителя" hidden></section>

      <button class="visually-hidden" id="export-button" type="button" aria-hidden="true" tabindex="-1">Скачать CSV</button>
      <div class="visually-hidden" id="summary-list" aria-hidden="true"></div>
      <div class="visually-hidden" id="hero-score" aria-hidden="true"></div>
      <span class="visually-hidden" id="done-count">0</span>
      <span class="visually-hidden" id="issue-count">0</span>
      <span class="visually-hidden" id="skipped-count">0</span>
    </main>
    <script src="./src/config.js?v=0.1.5"></script>
    <script type="module" src="./src/main.js?v=0.1.5"></script>
  </body>
</html>
